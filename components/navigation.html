<script>
  (function() {
    'use strict';

    // ----- QUICK ACTIONS -----
    const newBtn = document.getElementById('navQuickNew');
    const domainBtn = document.getElementById('navQuickDomain');

    if (newBtn) {
      newBtn.addEventListener('click', function() {
        window.location.href = '/builder/step-1';
      });
    }

    if (domainBtn) {
      domainBtn.addEventListener('click', function() {
        window.location.href = '/domain';
      });
    }

    // ----- BREADCRUMB AUTO-GENERATION -----
    function updateBreadcrumb() {
      const path = window.location.pathname;
      const breadcrumb = document.getElementById('navBreadcrumb');
      if (!breadcrumb) return;

      const current = breadcrumb.querySelector('.breadcrumb-current');
      if (!current) return;

      // Simple breadcrumb generation
      const segments = path.split('/').filter(Boolean);
      if (segments.length === 0) {
        current.textContent = 'Home';
        return;
      }

      // Get the last segment
      const last = segments[segments.length - 1];
      // Format: replace hyphens with spaces, capitalize
      const formatted = last
        .replace(/-/g, ' ')
        .replace(/\b\w/g, function(l) { return l.toUpperCase(); });

      current.textContent = formatted || 'Home';
    }

    updateBreadcrumb();

    // ----- ACTIVE LINK HIGHLIGHT -----
    function highlightActiveLink() {
      const path = window.location.pathname;
      document.querySelectorAll('.nav-secondary .secondary-link').forEach(function(link) {
        const href = link.getAttribute('href');
        if (href && path.includes(href)) {
          link.classList.add('active');
        } else {
          link.classList.remove('active');
        }
      });
    }

    highlightActiveLink();

    console.log('Swayam Navigation component initialized.');
  })();
</script>
