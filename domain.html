<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domain — Swayam</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* base styles */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#0a0a1a; color:#f0ece6; }
    .container { max-width:1280px; margin:0 auto; padding:0 24px; }
    .header { background:rgba(10,10,26,0.92); backdrop-filter:blur(18px); border-bottom:1px solid rgba(184,134,11,0.15); position:sticky; top:0; z-index:1000; padding:14px 0; }
    .header-inner { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .logo-icon { width:48px; height:48px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #b8860b, #8b6508); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#fff; }
    .logo-text { font-size:1.6rem; font-weight:700; background:linear-gradient(135deg,#f0ece6, #b8860b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-text span { font-weight:300; -webkit-text-fill-color:rgba(255,255,255,0.4); }
    .nav-links a { color:rgba(255,255,255,0.6); text-decoration:none; font-size:0.9rem; font-weight:500; margin-left:28px; }
    .nav-links a:hover { color:#fff; }
    .nav-links a.active { color:#b8860b; }
    .header-cta { padding:8px 24px; border-radius:40px; background:linear-gradient(135deg,#b8860b,#d4a017); color:#fff !important; font-weight:600; margin-left:20px; }

    .domain-search { max-width:600px; margin:40px auto; text-align:center; }
    .domain-search h1 { font-size:2.4rem; margin-bottom:8px; }
    .domain-search p { color:rgba(255,255,255,0.4); margin-bottom:24px; }
    .search-box { display:flex; gap:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:60px; padding:4px; }
    .search-box input { flex:1; padding:14px 20px; background:transparent; border:none; color:#fff; font-size:1rem; outline:none; }
    .search-box button { padding:12px 32px; border-radius:40px; background:linear-gradient(135deg,#b8860b,#d4a017); border:none; color:#fff; font-weight:700; cursor:pointer; }
    .search-box button:hover { transform:scale(1.02); }

    .domain-results { margin-top:30px; display:flex; flex-direction:column; gap:12px; }
    .domain-item { display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); border-radius:12px; padding:12px 20px; }
    .domain-item .name { font-weight:500; }
    .domain-item .price { color:#b8860b; font-weight:600; }
    .domain-item .buy-btn { padding:6px 20px; border-radius:30px; background:rgba(184,134,11,0.15); border:1px solid #b8860b; color:#b8860b; cursor:pointer; transition:0.3s; }
    .domain-item .buy-btn:hover { background:#b8860b; color:#fff; }
  </style>
</head>
<body>
  <header class="header"><!-- same header --></header>

  <div class="container">
    <div class="domain-search">
      <h1>Find Your Perfect Domain</h1>
      <p>Start with ₹3000/year — includes SSL & auto‑renewal.</p>
      <div class="search-box">
        <input type="text" placeholder="yourbusiness.com" id="domainInput" value="myvedicbrand.com" />
        <button id="searchDomain"><i class="fas fa-search"></i> Check</button>
      </div>
      <div class="domain-results" id="domainResults">
        <div class="domain-item"><span class="name">myvedicbrand.com</span><span class="price">₹3000/year</span><button class="buy-btn">Buy Now</button></div>
        <div class="domain-item"><span class="name">myvedicbrand.in</span><span class="price">₹3000/year</span><button class="buy-btn">Buy Now</button></div>
        <div class="domain-item"><span class="name">myvedicbrand.co</span><span class="price">₹3000/year</span><button class="buy-btn">Buy Now</button></div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('searchDomain').addEventListener('click', function() {
      const val = document.getElementById('domainInput').value.trim();
      if (!val) return;
      // Simulate domain search
      const results = document.getElementById('domainResults');
      results.innerHTML = `
        <div class="domain-item"><span class="name">${val}</span><span class="price">₹3000/year</span><button class="buy-btn">Buy Now</button></div>
        <div class="domain-item"><span class="name">${val.replace('.com','.in')}</span><span class="price">₹3000/year</span><button class="buy-btn">Buy Now</button></div>
        <div class="domain-item"><span class="name">${val.replace('.com','.co')}</span><span class="price">₹3000/year</span><button class="buy-btn">Buy Now</button></div>
      `;
    });
  </script>
</body>
</html>
