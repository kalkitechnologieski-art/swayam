<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Builder — Swayam</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* Same header/footer styles from index.html – we’ll keep them consistent */
    /* For brevity, we include the same base styles; in production, use a shared CSS file */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#0a0a1a; color:#f0ece6; }
    .container { max-width:1280px; margin:0 auto; padding:0 24px; }
    /* Header (same as index) ... */
    .header { background:rgba(10,10,26,0.92); backdrop-filter:blur(18px); border-bottom:1px solid rgba(184,134,11,0.15); position:sticky; top:0; z-index:1000; padding:14px 0; }
    .header-inner { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .logo-icon { width:48px; height:48px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #b8860b, #8b6508); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#fff; }
    .logo-text { font-size:1.6rem; font-weight:700; background:linear-gradient(135deg,#f0ece6, #b8860b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-text span { font-weight:300; -webkit-text-fill-color:rgba(255,255,255,0.4); }
    .nav-links a { color:rgba(255,255,255,0.6); text-decoration:none; font-size:0.9rem; font-weight:500; margin-left:28px; }
    .nav-links a:hover { color:#fff; }
    .nav-links a.active { color:#b8860b; }
    .header-cta { padding:8px 24px; border-radius:40px; background:linear-gradient(135deg,#b8860b,#d4a017); color:#fff !important; font-weight:600; margin-left:20px; }

    /* Builder Layout */
    .builder-wrapper { display:grid; grid-template-columns:280px 1fr; gap:24px; padding:30px 0; min-height:80vh; }
    .builder-sidebar { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); border-radius:16px; padding:20px; height:fit-content; position:sticky; top:100px; }
    .builder-sidebar h3 { color:#b8860b; font-size:0.9rem; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:16px; }
    .builder-sidebar label { display:block; font-size:0.8rem; color:rgba(255,255,255,0.5); margin:12px 0 4px; }
    .builder-sidebar input, .builder-sidebar select, .builder-sidebar textarea { width:100%; padding:10px 14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:10px; color:#fff; font-family:inherit; outline:none; }
    .builder-sidebar input:focus, .builder-sidebar select:focus, .builder-sidebar textarea:focus { border-color:#b8860b; }
    .builder-sidebar textarea { height:80px; resize:vertical; }
    .builder-sidebar .btn-generate { width:100%; padding:12px; border-radius:40px; background:linear-gradient(135deg,#b8860b,#d4a017); border:none; color:#fff; font-weight:700; cursor:pointer; transition:0.3s; margin-top:16px; }
    .builder-sidebar .btn-generate:hover { transform:scale(1.02); }

    .builder-preview { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); border-radius:16px; padding:20px; }
    .builder-preview .preview-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .builder-preview .preview-header h2 { font-size:1.2rem; }
    .builder-preview .preview-actions button { padding:8px 16px; border-radius:30px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); color:#fff; cursor:pointer; transition:0.3s; }
    .builder-preview .preview-actions button:hover { background:rgba(184,134,11,0.15); border-color:#b8860b; }
    .preview-iframe { width:100%; height:500px; border:1px solid rgba(255,255,255,0.04); border-radius:12px; background:#111; }

    .theme-selector { display:flex; flex-wrap:wrap; gap:10px; margin:16px 0; }
    .theme-thumb { width:60px; height:60px; border-radius:12px; border:2px solid transparent; cursor:pointer; overflow:hidden; background:#222; }
    .theme-thumb.active { border-color:#b8860b; }
    .theme-thumb img { width:100%; height:100%; object-fit:cover; }

    @media (max-width:768px) { .builder-wrapper { grid-template-columns:1fr; } .builder-sidebar { position:relative; top:0; } }
    /* footer ... (same as index) */
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><div class="logo-icon">🕉</div><div class="logo-text">Swayam<span>AI</span></div></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="builder.html" class="active">Builder</a>
        <a href="themes.html">Themes</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="domain.html">Domain</a>
        <a href="about.html">About</a>
        <a href="https://kalki-intelligence.in" target="_blank" class="header-cta">Kalki AI</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="builder-wrapper">
      <!-- Sidebar -->
      <aside class="builder-sidebar">
        <h3><i class="fas fa-wand-magic-sparkles" style="margin-right:8px;"></i> AI Settings</h3>
        <label>Business Name</label>
        <input type="text" id="bizName" value="My Vedic Brand" />

        <label>Describe your business</label>
        <textarea id="bizDesc">We offer holistic wellness and digital marketing services inspired by ancient Indian wisdom.</textarea>

        <label>Industry</label>
        <select id="industry">
          <option value="business">Business / Corporate</option>
          <option value="agency" selected>Digital Agency</option>
          <option value="portfolio">Portfolio</option>
          <option value="ecommerce">E-commerce</option>
          <option value="blog">Blog</option>
          <option value="consulting">Consulting</option>
        </select>

        <label>Theme (choose from gallery)</label>
        <div class="theme-selector">
          <div class="theme-thumb active" style="background:linear-gradient(135deg,#b8860b,#d4a017);" data-theme="vedic-gold"></div>
          <div class="theme-thumb" style="background:linear-gradient(135deg,#1a1a2e,#2d2d44);" data-theme="dark-minimal"></div>
          <div class="theme-thumb" style="background:linear-gradient(135deg,#f0ece6,#c4b5fd);" data-theme="light-elegant"></div>
          <div class="theme-thumb" style="background:linear-gradient(135deg,#2e7d32,#66bb6a);" data-theme="nature"></div>
        </div>

        <button class="btn-generate" id="generateBtn"><i class="fas fa-robot" style="margin-right:8px;"></i> Generate Website</button>
        <div style="margin-top:12px; font-size:0.75rem; color:rgba(255,255,255,0.2);">Powered by Gemini AI</div>
      </aside>

      <!-- Preview -->
      <main class="builder-preview">
        <div class="preview-header">
          <h2><i class="fas fa-eye" style="color:#b8860b; margin-right:8px;"></i> Live Preview</h2>
          <div class="preview-actions">
            <button id="deployBtn"><i class="fas fa-cloud-upload-alt"></i> Deploy to Vercel</button>
            <button id="downloadBtn"><i class="fas fa-download"></i> Download</button>
          </div>
        </div>
        <div class="preview-iframe" id="previewFrame">
          <!-- Simulated generated website preview -->
          <div style="padding:40px; text-align:center; color:rgba(255,255,255,0.3);">
            <i class="fas fa-om" style="font-size:3rem; color:#b8860b; opacity:0.3;"></i>
            <p style="margin-top:20px;">Your AI-generated website will appear here.</p>
            <p style="font-size:0.85rem;">Click "Generate Website" to begin.</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <footer class="footer" style="padding:20px 0; text-align:center; border-top:1px solid rgba(255,255,255,0.04); margin-top:20px; color:rgba(255,255,255,0.2);">
    <div class="container">
      <p>© 2026 Swayam — An AI Website Builder by <a href="https://kalki-intelligence.in" target="_blank" style="color:#b8860b;">Kalki Intelligence</a></p>
    </div>
  </footer>

  <script>
    // Simulate AI generation
    document.getElementById('generateBtn').addEventListener('click', function() {
      const name = document.getElementById('bizName').value || 'My Business';
      const desc = document.getElementById('bizDesc').value || 'We provide amazing services.';
      const preview = document.getElementById('previewFrame');
      preview.innerHTML = `
        <div style="padding:40px; background:linear-gradient(135deg,#0a0a1a,#1a1a2e); color:#f0ece6; min-height:100%;">
          <div style="max-width:800px; margin:0 auto; text-align:center;">
            <div style="font-size:4rem; color:#b8860b; opacity:0.3;">ॐ</div>
            <h1 style="font-size:2.8rem; margin:20px 0 10px;">${name}</h1>
            <p style="font-size:1.2rem; color:rgba(255,255,255,0.7);">${desc}</p>
            <div style="display:flex; gap:16px; justify-content:center; margin:30px 0;">
              <span style="padding:8px 20px; background:rgba(184,134,11,0.15); border-radius:40px; color:#b8860b;">SEO Optimized</span>
              <span style="padding:8px 20px; background:rgba(184,134,11,0.15); border-radius:40px; color:#b8860b;">GEO Ready</span>
              <span style="padding:8px 20px; background:rgba(184,134,11,0.15); border-radius:40px; color:#b8860b;">AEO Compliant</span>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-top:30px;">
              <div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:12px;">About Us</div>
              <div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:12px;">Services</div>
              <div style="background:rgba(255,255,255,0.02); padding:20px; border-radius:12px;">Contact</div>
            </div>
            <p style="margin-top:40px; font-size:0.8rem; color:rgba(255,255,255,0.2);">Powered by Swayam AI • Built with Vedic Intelligence</p>
          </div>
        </div>
      `;
    });

    // Theme selection highlighting
    document.querySelectorAll('.theme-thumb').forEach(el => {
      el.addEventListener('click', function() {
        document.querySelectorAll('.theme-thumb').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        // In reality, would change preview theme
      });
    });

    // Deploy simulation
    document.getElementById('deployBtn').addEventListener('click', function() {
      alert('🚀 Your website is being deployed to Vercel! You will receive a preview URL shortly.');
    });
  </script>
</body>
</html>
