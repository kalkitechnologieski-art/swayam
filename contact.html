<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Swayam</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* base styles */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#0a0a1a; color:#f0ece6; }
    .container { max-width:1280px; margin:0 auto; padding:0 24px; }
    .header { background:rgba(10,10,26,0.92); backdrop-filter:blur(18px); border-bottom:1px solid rgba(184,134,11,0.15); position:sticky; top:0; z-index:1000; padding:14px 0; }
    .header-inner { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
    .logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .logo-icon { width:48px; height:48px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #b8860b, #8b6508); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#fff; }
    .logo-text { font-size:1.6rem; font-weight:700; background:linear-gradient(135deg,#f0ece6, #b8860b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-text span { font-weight:300; -webkit-text-fill-color:rgba(255,255,255,0.4); }
    .nav-links a { color:rgba(255,255,255,0.6); text-decoration:none; font-size:0.9rem; font-weight:500; margin-left:28px; }
    .nav-links a:hover { color:#fff; }
    .nav-links a.active { color:#b8860b; }
    .header-cta { padding:8px 24px; border-radius:40px; background:linear-gradient(135deg,#b8860b,#d4a017); color:#fff !important; font-weight:600; margin-left:20px; }

    .contact-wrapper { display:grid; grid-template-columns:1fr 1fr; gap:40px; padding:40px 0; }
    .contact-form { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); border-radius:16px; padding:30px; }
    .contact-form h2 { margin-bottom:16px; }
    .contact-form label { display:block; font-size:0.8rem; color:rgba(255,255,255,0.5); margin:12px 0 4px; }
    .contact-form input, .contact-form textarea { width:100%; padding:12px 16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:10px; color:#fff; font-family:inherit; outline:none; }
    .contact-form input:focus, .contact-form textarea:focus { border-color:#b8860b; }
    .contact-form textarea { height:120px; }
    .contact-form button { margin-top:16px; padding:12px 32px; border-radius:40px; background:linear-gradient(135deg,#b8860b,#d4a017); border:none; color:#fff; font-weight:700; cursor:pointer; transition:0.3s; }
    .contact-form button:hover { transform:scale(1.02); }

    .contact-info { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); border-radius:16px; padding:30px; }
    .contact-info h2 { margin-bottom:16px; }
    .contact-info p { color:rgba(255,255,255,0.6); margin-bottom:12px; }
    .contact-info i { color:#b8860b; width:24px; }

    @media (max-width:768px) { .contact-wrapper { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="header"><!-- same header --></header>

  <div class="container">
    <div class="contact-wrapper">
      <div class="contact-form">
        <h2>Get in Touch</h2>
        <p style="color:rgba(255,255,255,0.4); margin-bottom:20px;">Have questions? We're here to help.</p>
        <form id="contactForm">
          <label>Your Name</label>
          <input type="text" required />
          <label>Email Address</label>
          <input type="email" required />
          <label>Message</label>
          <textarea required></textarea>
          <button type="submit"><i class="fas fa-paper-plane" style="margin-right:8px;"></i> Send</button>
        </form>
      </div>
      <div class="contact-info">
        <h2>Contact Information</h2>
        <p><i class="fas fa-envelope"></i> hello@swayam.ai</p>
        <p><i class="fas fa-phone"></i> +91-98765-43210</p>
        <p><i class="fas fa-map-marker-alt"></i> Kalki Intelligence, Delhi NCR, India</p>
        <p><i class="fas fa-globe"></i> <a href="https://kalki-intelligence.in" target="_blank" style="color:#b8860b;">kalki-intelligence.in</a></p>
        <div style="margin-top:30px; padding:16px; background:rgba(184,134,11,0.05); border-radius:12px;">
          <p style="font-size:0.9rem;">For partnership, media, or enterprise inquiries, reach out directly.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Thank you! We will get back to you soon. 🙏');
    });
  </script>
</body>
</html>
